name: CI

on:
  workflow_call:
    inputs:
      npm_command:
        description: 'NPM command to run'
        type: string
        required: true
        default: 'install'
      should_run:
        description: "Whether to actually execute the test. When 'false' the job runs but every step is skipped — this preserves the required-status-check contexts on docs-only PRs without burning CI minutes."
        type: string
        required: false
        default: 'true'
jobs:
  test:
    strategy:
      fail-fast: false # prevent test to stop if one fails
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - if: inputs.should_run == 'true'
        uses: actions/checkout@v4
      - if: inputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - if: inputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache/
          key: ${{ matrix.os }}-${{ matrix.node-version }}

      - if: inputs.should_run == 'true'
        run: yarn install

      - if: inputs.should_run == 'true'
        run: yarn build
      - if: inputs.should_run == 'true'
        run: yarn ${{ inputs.npm_command }}
        env:
          CI: true
        timeout-minutes: 30
