name: Cross-compile matrix

# Manual-only. The matrix burns billable minutes on macos-14 and windows
# runners; running it on every PR is not worth the cost. Trigger from the
# Actions tab when you need to verify cross-compile behaviour.
#
# macos-x64 is NOT tested as a build host — GitHub has retired Intel macOS
# runners (macos-13). It is still exercised as a target: macos-14 (Apple
# silicon) executes the produced x64 binaries through Rosetta 2, which is
# pre-installed on those runners.
on:
  workflow_dispatch:
    inputs:
      node-majors:
        description: 'Comma-separated node majors to test (e.g. 22 or 20,22,24)'
        required: false
        default: '22'

permissions:
  contents: read

concurrency:
  group: xcompile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Stage 0: parse inputs into a JSON matrix
  # --------------------------------------------------------------------------
  setup:
    name: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      nodes: ${{ steps.gen.outputs.nodes }}
    steps:
      - id: gen
        shell: bash
        env:
          NODE_MAJORS_INPUT: ${{ inputs.node-majors }}
        run: |
          set -euo pipefail
          # Validate and normalise: comma-separated list of integers.
          cleaned=$(echo "$NODE_MAJORS_INPUT" | tr -d ' ')
          if [[ -z "$cleaned" ]]; then cleaned=22; fi
          if ! [[ "$cleaned" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
            echo "::error::invalid node-majors input: '$NODE_MAJORS_INPUT' (expected comma-separated integers)"
            exit 1
          fi
          json=$(jq -c -n --arg s "$cleaned" '$s | split(",") | map(tonumber)')
          echo "nodes=$json" >> "$GITHUB_OUTPUT"
          echo "Parsed node majors: $json"

  # --------------------------------------------------------------------------
  # Stage 1: build
  # --------------------------------------------------------------------------
  # Each job is one (host × mode × node) tuple. It builds pkg once and then
  # compiles the hello.js fixture for every target. Binaries are uploaded as
  # a single artifact per job, with filenames encoding host/target/mode/node.
  # --------------------------------------------------------------------------
  build:
    name: build ${{ matrix.host.label }} / ${{ matrix.mode }} / n${{ matrix.node }}
    needs: setup
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # macos-x64 intentionally absent: no GitHub-hosted Intel macOS runner.
        host:
          - { label: linux-x64,   runner: ubuntu-24.04 }
          - { label: linux-arm64, runner: ubuntu-24.04-arm }
          - { label: macos-arm64, runner: macos-14 }
          - { label: win-x64,     runner: windows-latest }
        mode: [std, std-public, sea]
        node: ${{ fromJSON(needs.setup.outputs.nodes) }}
    runs-on: ${{ matrix.host.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install + build pkg
        shell: bash
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Create hello.js fixture
        shell: bash
        run: |
          mkdir -p fixture
          cat > fixture/hello.js <<'EOF'
          console.log('hello from pkg', process.platform, process.arch, process.version);
          EOF
          cat > fixture/package.json <<'EOF'
          { "name": "hello-pkg", "version": "1.0.0", "bin": "hello.js", "pkg": { "scripts": [] } }
          EOF

      - name: Build binaries for all targets
        shell: bash
        env:
          HOST: ${{ matrix.host.label }}
          MODE: ${{ matrix.mode }}
          NODE_MAJOR: ${{ matrix.node }}
        run: |
          set -u
          mkdir -p bin logs
          EXTRA=()
          case "$MODE" in
            std) ;;
            std-public) EXTRA+=(--public-packages '*' --public) ;;
            sea) EXTRA+=(--sea) ;;
          esac

          TARGETS=(linux-x64 linux-arm64 macos-x64 macos-arm64 win-x64)
          for target in "${TARGETS[@]}"; do
            ext=""
            case "$target" in win-*) ext=".exe" ;; esac
            base="${HOST}__${target}__${MODE}__n${NODE_MAJOR}"
            out="bin/${base}${ext}"
            log="logs/${base}.log"
            echo "::group::build $target"
            # "${EXTRA[@]+"${EXTRA[@]}"}" keeps bash 3.2 (macos runners) happy
            # when EXTRA is empty under `set -u`.
            # `|| status=$?` suppresses the runner's `-e` while still
            # capturing pkg's real exit code for the diagnostic below.
            status=0
            node ./lib-es5/bin.js fixture/hello.js -t "node${NODE_MAJOR}-${target}" -o "$out" ${EXTRA[@]+"${EXTRA[@]}"} >"$log" 2>&1 || status=$?
            if (( status == 0 )) && [[ -s "$out" ]]; then
              echo "::notice::built $out"
            else
              if (( status != 0 )); then
                echo "::warning::build failed for $target — exit $status (see $log)"
              else
                echo "::warning::pkg exited 0 but no output at $out"
              fi
              tail -n 40 "$log" || true
              # Ensure both the empty binary (so the run-stage reader always
              # enumerates this combo) AND a .failed sidecar exist, then ship
              # the build log alongside so failures are diagnosable without
              # re-running the whole matrix.
              : > "$out"
              : > "${out}.failed"
              cp "$log" "${out}.log"
            fi
            echo "::endgroup::"
          done
          ls -la bin/

      - uses: actions/upload-artifact@v4
        with:
          name: xcompile-bins-${{ matrix.host.label }}-${{ matrix.mode }}-n${{ matrix.node }}
          path: bin/
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Stage 2: run
  # --------------------------------------------------------------------------
  # One job per target runner. Downloads every artifact, filters to binaries
  # whose <target> segment matches this runner's target, and runs them. A
  # result JSON is uploaded, keyed by <host>|<mode>|<node>.
  # --------------------------------------------------------------------------
  run:
    name: run on ${{ matrix.target.label }}
    needs: [setup, build]
    if: ${{ always() && !cancelled() && needs.build.result != 'cancelled' }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # macos-x64 runs on macos-14 (arm64) via Rosetta 2 — pre-installed
        # on GitHub's Apple-silicon runners.
        target:
          - { label: linux-x64,   runner: ubuntu-24.04 }
          - { label: linux-arm64, runner: ubuntu-24.04-arm }
          - { label: macos-x64,   runner: macos-14 }
          - { label: macos-arm64, runner: macos-14 }
          - { label: win-x64,     runner: windows-latest }
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: bins-all
          pattern: xcompile-bins-*
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run matching binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target.label }}
        run: |
          mkdir -p results
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { spawnSync } = require('child_process');

          const TARGET = process.env.TARGET;
          const binsDir = 'bins-all';
          const results = {};

          if (!fs.existsSync(binsDir)) {
            console.log('no artifacts downloaded');
            fs.writeFileSync(`results/${TARGET}.json`, '{}');
            process.exit(0);
          }

          const sanitize = s =>
            ((s || '').toString().trim() || 'no output')
              .replace(/[`\\]/g, '')
              .replace(/\s+/g, ' ')
              .slice(0, 240);

          for (const name of fs.readdirSync(binsDir)) {
            // Skip sidecar artifacts — only process binaries.
            if (name.endsWith('.failed') || name.endsWith('.log')) continue;
            const full = path.join(binsDir, name);
            const base = name.replace(/\.exe$/, '');
            const parts = base.split('__');
            if (parts.length !== 4) {
              console.log('skip unrecognised:', name);
              continue;
            }
            const [host, target, mode, nodeTag] = parts;
            if (target !== TARGET) continue;
            const key = `${host}|${mode}|${nodeTag}`;
            // BUILD_FAIL if a .failed sidecar exists for this binary.
            // Pull the tail of the build log into detail so the collated
            // matrix surfaces the real error without needing to download
            // the artifact.
            if (fs.existsSync(path.join(binsDir, `${name}.failed`))) {
              const logPath = path.join(binsDir, `${name}.log`);
              let detail = '';
              if (fs.existsSync(logPath)) {
                const tail = fs.readFileSync(logPath, 'utf8').trim().split(/\r?\n/).slice(-5).join(' | ');
                detail = sanitize(tail);
              }
              results[key] = { status: 'BUILD_FAIL', detail };
              continue;
            }
            try { fs.chmodSync(full, 0o755); } catch {}
            const r = spawnSync(path.resolve(full), [], {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
              timeout: 30_000,
            });
            if (r.status === 0 && (r.stdout || '').includes('hello from pkg')) {
              results[key] = { status: 'RUN_OK', detail: sanitize(r.stdout) };
            } else {
              const reason = r.status != null
                ? `exit ${r.status}`
                : r.signal
                  ? `signal ${r.signal}`
                  : r.error
                    ? `spawn-error: ${r.error.code || r.error.message}`
                    : 'unknown-failure';
              const detail = sanitize(r.stderr || r.stdout || reason);
              results[key] = { status: 'RUN_FAIL', detail };
            }
            console.log(name, '→', results[key].status);
          }

          fs.writeFileSync(`results/${TARGET}.json`, JSON.stringify(results, null, 2));
          NODE
          cat "results/${TARGET}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: xcompile-results-${{ matrix.target.label }}
          path: results/
          retention-days: 7
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Stage 3: collate
  # --------------------------------------------------------------------------
  # Downloads all per-target result JSONs, renders the matrix as markdown,
  # and writes it to the workflow job summary. No PR-comment path — this
  # workflow is dispatch-only.
  # --------------------------------------------------------------------------
  collate:
    name: collate summary
    needs: [setup, build, run]
    if: ${{ always() && !cancelled() && needs.build.result != 'cancelled' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: results
          pattern: xcompile-results-*
          merge-multiple: true

      - name: Short-circuit if no results
        id: check
        shell: bash
        run: |
          if ! ls results/*.json >/dev/null 2>&1; then
            echo "::error::no result artifacts found — build stage produced nothing"
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "empty=false" >> "$GITHUB_OUTPUT"

      - name: Build markdown matrix
        if: steps.check.outputs.empty != 'true'
        shell: bash
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NODES_JSON: ${{ needs.setup.outputs.nodes }}
        run: |
          node <<'NODE' > comment.md
          const fs = require('fs');
          const path = require('path');

          const targets = ['linux-x64','linux-arm64','macos-x64','macos-arm64','win-x64'];
          const hosts   = targets;
          const modes   = ['std','std-public','sea'];
          const nodes   = JSON.parse(process.env.NODES_JSON).map(n => `n${n}`);

          // Load per-target results.
          const byTarget = {};
          for (const t of targets) {
            const f = path.join('results', `${t}.json`);
            byTarget[t] = fs.existsSync(f) ? JSON.parse(fs.readFileSync(f, 'utf8')) : {};
          }

          const icon = r => {
            if (!r) return ':grey_question:';
            if (r.status === 'RUN_OK') return ':white_check_mark:';
            if (r.status === 'BUILD_FAIL') return ':x:&nbsp;build';
            if (r.status === 'RUN_FAIL') return ':x:&nbsp;run';
            return ':warning:';
          };

          let out = '## Cross-compile matrix\n\n';
          out += 'Each cell: the hello.js binary was **built on the row host** and **executed on the column target runner**. ';
          out += `Commit: \`${process.env.COMMIT_SHA.slice(0,8)}\` — [full run](${process.env.RUN_URL})\n\n`;
          out += '**Legend**: :white_check_mark: runs · :x:&nbsp;build build failed · :x:&nbsp;run built but crashed on target · :grey_question: missing\n\n';

          for (const node of nodes) {
            const nodeMajor = node.slice(1);
            for (const mode of modes) {
              out += `### Node ${nodeMajor} — \`${mode}\`\n\n`;
              out += '| host \\ target | ' + targets.join(' | ') + ' |\n';
              out += '|---|' + targets.map(()=>':---:').join('|') + '|\n';
              for (const host of hosts) {
                let row = `| **${host}** |`;
                for (const target of targets) {
                  const key = `${host}|${mode}|${node}`;
                  row += ' ' + icon(byTarget[target]?.[key]) + ' |';
                }
                out += row + '\n';
              }
              out += '\n';
            }
          }

          // Collect failure details as a collapsible section
          const failures = [];
          for (const target of targets) {
            for (const [key, r] of Object.entries(byTarget[target] || {})) {
              if (r.status !== 'RUN_OK' && r.detail) {
                failures.push(`- **${key} → ${target}** (${r.status}): \`${r.detail.slice(0,180)}\``);
              }
            }
          }
          if (failures.length) {
            out += '<details><summary>Failure details</summary>\n\n';
            out += failures.join('\n');
            out += '\n\n</details>\n';
          }

          process.stdout.write(out);
          NODE
          echo "--- comment.md ---"
          cat comment.md

      - name: Write matrix to job summary
        if: steps.check.outputs.empty != 'true'
        shell: bash
        run: cat comment.md >> "$GITHUB_STEP_SUMMARY"
