# Codecov config — keep coverage informational, don't gate PRs on it.
# PR CI uploads `flags: unit` on every build; coverage-nightly.yml uploads
# `flags: e2e` daily on main. carryforward (below) merges the two per commit.
coverage:
  status:
    project:
      default:
        # Report but never fail the PR. Coverage swings naturally with the
        # unit-vs-e2e split and the 24h lag on e2e refreshes.
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        # New lines should be covered by the unit suite when reasonable, but
        # many changes land in integration-heavy modules (walker, producer,
        # packer) that stay e2e-tested. Warn, don't fail.
        informational: true

comment:
  layout: "reach, diff, files"
  behavior: default
  require_changes: true

ignore:
  - "lib-es5/**"
  - "test/**"
  - "prelude/**"
  - "dictionary/**"
  - "scripts/**"
  - "docs-site/**"
  - "**/*.d.ts"

# Both flags carry forward: a PR commit only has a `unit` upload (the nightly
# e2e job runs on main, not on PR branches), and a main push between nightlies
# only has `unit`. carryforward: true tells Codecov "if this commit didn't
# upload flag X, reuse the most recent upload tagged with flag X" — so PR
# reports show merged unit+e2e numbers instead of unit-only (~37%).
flags:
  unit:
    paths:
      - lib/
    carryforward: true
  e2e:
    paths:
      - lib/
    carryforward: true
